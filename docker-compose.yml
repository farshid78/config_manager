services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: configbot
      POSTGRES_PASSWORD: configbot
      POSTGRES_DB: configbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U configbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://configbot:configbot@db:5432/configbot
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
